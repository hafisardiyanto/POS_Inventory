version: '3.8'

services:
  app:
    image: php:8.2-fpm 
    container_name: pos_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - pos_network

  web:
    image: nginx:alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "8080:80" 
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf 
    depends_on:
      - app
    networks:
      - pos_network

  db:
    image: mysql:8.0
    container_name: pos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pos_inventory
      MYSQL_ROOT_PASSWORD: secret_password
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
    ports:
      - "3310:3306" 
    volumes:
      - pos_dbdata:/var/lib/mysql
    networks:
      - pos_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pos_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: secret_password
    ports:
      - "8091:80" 
    depends_on:
      - db
    networks:
      - pos_network

networks:
  pos_network:
    driver: bridge

volumes:
  pos_dbdata:
